<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Aulia Zahra Putrika ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; background-color: #fce4ec; font-family: 'Poppins', sans-serif;
            overflow: hidden; text-align: center;
        }
        .card {
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 350px; width: 90%; z-index: 10;
        }
        h1 { color: #ad1457; font-size: 1.3rem; margin-bottom: 20px; }
        .btn-container {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; margin-top: 20px; min-height: 50px; position: relative;
        }
        button {
            padding: 12px 25px; border-radius: 50px; border: none;
            font-weight: bold; cursor: pointer; transition: transform 0.2s;
        }
        #btnYes { background-color: #ff4081; color: white; position: relative; z-index: 5; }
        #btnNo { background-color: #9e9e9e; color: white; position: relative; z-index: 10; }
        
        /* Overlay Awal buat aktifin musik */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ff4081; color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999; cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Tombol Masuk buat Trigger Musik -->
    <div id="overlay" onclick="mulai()">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExN3RreXF6ZzRyc3R6eGZ6ZzRyc3R6eGZ6ZzRyc3R6eGZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/vVzH2FxMo7NTvaSaro/giphy.gif" width="100">
        <h2 style="margin-top:20px;">Klik untuk Buka Pesan ❤️</h2>
    </div>

    <!-- Musik Maroon 5 - She Will Be Loved -->
    <audio id="bgMusic" loop>
        <source src="https://raw.githubusercontent.com/Hadi-Kusuma/music-host/main/Maroon%205%20-%20She%20Will%20Be%20Loved.mp3" type="audio/mpeg">
    </audio>

    <div class="card">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueGZ3bmZ6ZzRyc3R6eGZ6ZzRyc3R6eGZ6ZzRyc3R6eGZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/cLS1cfxvGOPVpf9g3y/giphy.gif" width="120" style="margin-bottom: 20px;">
        <h1 id="question">Aulia Zahra Putrika,<br>Mau jadi pacar aku gak? 🌹</h1>
        
        <div class="btn-container">
            <button id="btnYes" onclick="accepted()">MAU!</button>
            <button id="btnNo" onmouseover="moveButton()" onclick="moveButton()">Gak.</button>
        </div>
    </div>

    <script>
        let yesSize = 1;
        const music = document.getElementById('bgMusic');
        const overlay = document.getElementById('overlay');

        function mulai() {
            music.play().catch(e => console.log("Musik diblokir: ", e));
            overlay.style.display = 'none';
        }

        function moveButton() {
            const btnNo = document.getElementById('btnNo');
            const btnYes = document.getElementById('btnYes');
            
            btnNo.style.position = 'fixed';
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight);
            
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';

            yesSize += 0.4;
            btnYes.style.transform = `scale(${yesSize})`;
        }

        function accepted() {
            document.body.innerHTML = `
                <div style="padding:20px; text-align:center;">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExN3RreXF6ZzRyc3R6eGZ6ZzRyc3R6eGZ6ZzRyc3R6eGZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/vVzH2FxMo7NTvaSaro/giphy.gif" width="200">
                    <h1 style="color:#ff4081;">YAY! I Love You, Aulia! ❤️</h1>
                    <p>Lagi buka WhatsApp...</p>
                </div>`;
            
            // FIX LINK WHATSAPP
            setTimeout(() => {
                const noWA = "6285183385354";
                const pesan = encodeURIComponent("I SAY YES! Aulia Zahra Putrika is Yours ❤️");
                window.location.href = `https://api.whatsapp.com/send?phone=${noWA}&text=${pesan}`;
            }, 2500);
        }
    </script>
</body>
</html>
