<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Aulia Zahra Putrika ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; background-color: #fce4ec; font-family: 'Poppins', sans-serif;
            overflow: hidden; text-align: center;
        }
        .card {
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 350px; width: 90%; z-index: 10;
        }
        h1 { color: #ad1457; font-size: 1.3rem; margin-bottom: 20px; }
        .btn-container {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; margin-top: 20px; min-height: 50px; position: relative;
        }
        button {
            padding: 12px 25px; border-radius: 50px; border: none;
            font-weight: bold; cursor: pointer; transition: transform 0.2s;
        }
        #btnYes { background-color: #ff4081; color: white; position: relative; z-index: 5; }
        #btnNo { background-color: #9e9e9e; color: white; position: relative; z-index: 10; }
    </style>
</head>
<body>

    <!-- Musik Maroon 5 - She Will Be Loved -->
    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/972w0a.mp3" type="audio/mpeg">
    </audio>

    <div class="card">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueGZ3bmZ6ZzRyc3R6eGZ6ZzRyc3R6eGZ6ZzRyc3R6eGZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/cLS1cfxvGOPVpf9g3y/giphy.gif" width="120" style="margin-bottom: 20px;">
        <h1 id="question">Aulia Zahra Putrika,<br>Mau jadi pacar aku gak? 🌹</h1>
        
        <div class="btn-container">
            <button id="btnYes" onclick="accepted()">MAU!</button>
            <button id="btnNo" onmouseover="moveButton()" onclick="moveButton()">Gak.</button>
        </div>
        <p style="font-size: 0.7rem; color: #ad1457; margin-top: 15px;">(Coba gerakin mouse/sentuh layar biar musiknya nyala ✨)</p>
    </div>

    <script>
        let yesSize = 1;
        const music = document.getElementById('bgMusic');

        // Musik nyala pas ada interaksi
        const startMusic = () => {
            music.play();
            document.removeEventListener('mousemove', startMusic);
            document.removeEventListener('touchstart', startMusic);
        };
        document.addEventListener('mousemove', startMusic);
        document.addEventListener('touchstart', startMusic);

        function moveButton() {
            const btnNo = document.getElementById('btnNo');
            const btnYes = document.getElementById('btnYes');
            
            btnNo.style.position = 'fixed';
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight);
            
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';

            yesSize += 0.4;
            btnYes.style.transform = `scale(${yesSize})`;
        }

        function accepted() {
            document.body.innerHTML = `
                <div style="padding:20px;">
                    <img src="https://media.giphy.com/media/vVzH2FxMo7NTvaSaro/giphy.gif" width="200">
                    <h1 style="color:#ff4081;">YAY! I Love You, Aulia! ❤️</h1>
                    <p>Lagi buka WhatsApp...</p>
                </div>`;
            setTimeout(() => {
                window.location.href = "https://wa.me/6285183385354?text=I%20SAY%20YES!%20Aulia%20Zahra%20Putrika%20is%20Yours%20❤️";
            }, 2500);
        }
    </script>
</body>
</html>
