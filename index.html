<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Aulia Zahra Putrika ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; background-color: #fce4ec; font-family: 'Poppins', sans-serif;
            overflow: hidden; text-align: center;
        }
        .card {
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 350px; width: 90%; z-index: 10;
        }
        h1 { color: #ad1457; font-size: 1.3rem; margin-bottom: 20px; }
        
        /* Wadah tombol biar rapi di awal */
        .btn-container {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; margin-top: 20px; min-height: 50px; position: relative;
        }
        
        button {
            padding: 12px 25px; border-radius: 50px; border: none;
            font-weight: bold; cursor: pointer; font-family: 'Poppins', sans-serif;
            transition: transform 0.2s;
        }
        
        #btnYes { background-color: #ff4081; color: white; position: relative; z-index: 5; }
        
        /* Tombol No dikasih warna abu biar beda */
        #btnNo { background-color: #9e9e9e; color: white; position: relative; z-index: 10; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueGZ3bmZ6ZzRyc3R6eGZ6ZzRyc3R6eGZ6ZzRyc3R6eGZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/cLS1cfxvGOPVpf9g3y/giphy.gif" width="120" style="margin-bottom: 20px;">
        <h1 id="question">Aulia Zahra Putrika,<br>Mau jadi pacar aku gak? 🌹</h1>
        
        <div class="btn-container">
            <button id="btnYes" onclick="accepted()">MAU!</button>
            <button id="btnNo" onmouseover="moveButton()" onclick="moveButton()">Gak.</button>
        </div>
    </div>

    <script>
        let yesSize = 1;

        function moveButton() {
            const btnNo = document.getElementById('btnNo');
            const btnYes = document.getElementById('btnYes');
            
            // Ubah posisi jadi fixed biar bisa lari ke mana aja setelah di-hover
            btnNo.style.position = 'fixed';
            
            // Kalkulasi posisi random
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight);
            
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';

            // Efek tombol YES membesar
            yesSize += 0.4;
            btnYes.style.transform = `scale(${yesSize})`;
        }

        function accepted() {
            document.body.innerHTML = `
                <div style="padding:20px;">
                    <img src="https://media.giphy.com/media/vVzH2FxMo7NTvaSaro/giphy.gif" width="200">
                    <h1 style="color:#ff4081;">YAY! I Love You, Aulia! ❤️</h1>
                </div>`;
            setTimeout(() => {
                // JANGAN LUPA GANTI NOMOR WA LO DI SINI
                window.location.href = "https://wa.me/628XXXXXXXXXX?text=I%20SAY%20YES!%20❤️";
            }, 2000);
        }
    </script>
</body>
</html>
