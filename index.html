<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Aulia Zahra Putrika ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; background-color: #fce4ec; font-family: 'Poppins', sans-serif;
            overflow: hidden; text-align: center;
        }
        .card {
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 350px; width: 90%; z-index: 10;
        }
        h1 { color: #ad1457; font-size: 1.3rem; margin-bottom: 20px; }
        .btn-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; position: relative; height: 60px; }
        button { padding: 12px 25px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        #btnYes { background-color: #ff4081; color: white; z-index: 100; }
        #btnNo { background-color: #9e9e9e; color: white; position: absolute; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://media.giphy.com/media/cLS1cfxvGOPVpf9g3y/giphy.gif" width="120" style="margin-bottom: 20px;">
        <h1 id="question">Aulia Zahra Putrika,<br>Mau jadi pacar aku gak? 🌹</h1>
        <div class="btn-container">
            <button id="btnYes" onclick="accepted()">MAU!</button>
            <button id="btnNo" onmouseover="moveAndGrow()" onclick="moveAndGrow()">Gak.</button>
        </div>
    </div>
    <script>
        let yesSize = 1;
        function moveAndGrow() {
            const btnNo = document.getElementById('btnNo');
            const btnYes = document.getElementById('btnYes');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);
            btnNo.style.position = 'fixed'; btnNo.style.left = x + 'px'; btnNo.style.top = y + 'px';
            yesSize += 0.5; btnYes.style.transform = `scale(${yesSize})`;
        }
        function accepted() {
            document.body.innerHTML = `<h1>I Love You, Aulia! ❤️</h1>`;
            setTimeout(() => {
                window.location.href = "https://wa.me/628123456789?text=I%20SAY%20YES!%20❤️"; // Ganti nomor lo
            }, 2000);
        }
    </script>
</body>
</html>
